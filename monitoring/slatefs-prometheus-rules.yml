groups:
  - name: slatefs.daemon
    rules:
      - alert: SlateFSVolumeFenced
        expr: slatefs_volume_dead == 1
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "SlateFS volume {{ $labels.tenant }}/{{ $labels.volume }} was fenced"
          description: "A newer SlateDB writer took over this volume. The stale daemon has marked the volume dead and is dropping exports."

      - alert: SlateFSDaemonMetricsMissing
        expr: absent(up{job="slatefsd"} == 1)
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "SlateFS daemon metrics scrape is missing"
          description: "Prometheus has no healthy scrape target for job=slatefsd. Check the daemon process, scrape config, and [metrics].listen."

      - alert: SlateFSTLSCertificateExpiresSoon
        expr: (slatefs_tls_cert_expiry_timestamp_seconds - time()) < 21 * 24 * 60 * 60
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SlateFS TLS certificate for {{ $labels.surface }} expires within 21 days"
          description: "The TLS certificate served by {{ $labels.surface }} is nearing expiry. Check certificate renewal and slatefsd TLS reload logs."

      - alert: SlateFSTLSCertificateExpiresCritical
        expr: (slatefs_tls_cert_expiry_timestamp_seconds - time()) < 7 * 24 * 60 * 60
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SlateFS TLS certificate for {{ $labels.surface }} expires within 7 days"
          description: "The TLS certificate served by {{ $labels.surface }} is close to expiry. Renew the certificate and verify slatefsd reload success."

      - alert: SlateFSBlockDecodeFailures
        expr: increase(slatefs_block_decode_failures_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "SlateFS block decode failures on {{ $labels.tenant }}/{{ $labels.volume }}"
          description: "A SlateDB block failed AEAD verification. Treat this as possible wrong-key, corruption, tampering, or object-store rollback and stop serving the affected volume."

      - alert: SlateFSVolumeDegraded
        expr: slatefs_volume_degraded == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "SlateFS volume {{ $labels.tenant }}/{{ $labels.volume }} has storage errors"
          description: "The daemon observed non-fencing SlateDB/object-store errors for this writable volume. Check object-store reachability, credentials, and recent storage-error logs."

      - alert: SlateFSQuotaBytesHigh
        expr: (slatefs_quota_bytes_used / slatefs_quota_bytes_hard_limit) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SlateFS byte quota is high on {{ $labels.tenant }}/{{ $labels.volume }}"
          description: "Byte quota usage is above 90% of the configured hard limit."

      - alert: SlateFSQuotaInodesHigh
        expr: (slatefs_quota_inodes_used / slatefs_quota_inodes_hard_limit) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SlateFS inode quota is high on {{ $labels.tenant }}/{{ $labels.volume }}"
          description: "Inode quota usage is above 90% of the configured hard limit."

      - alert: SlateFSQuotaRejections
        expr: increase(slatefs_quota_rejections_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "SlateFS quota rejections on {{ $labels.tenant }}/{{ $labels.volume }}"
          description: "The daemon returned EDQUOT for one or more quota-gated operations."

      - alert: SlateFSRateLimitRejections
        expr: increase(slatefs_rate_limit_rejections_total[5m]) > 0
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "SlateFS tenant rate-limit rejections for {{ $labels.tenant }}"
          description: "The daemon returned EAGAIN because a tenant ops/bytes token bucket was exhausted."

      - alert: SlateFSNBDAttachRejections
        expr: sum by (tenant, volume, reason) (increase(slatefs_nbd_attach_rejected_total[5m])) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "SlateFS NBD attach rejected for {{ $labels.tenant }}/{{ $labels.volume }}"
          description: "One or more NBD client attaches were rejected. Check the reason label for busy, allowlist, name, or invalid negotiation failures."
