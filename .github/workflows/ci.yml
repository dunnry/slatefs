name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # Phase 0 integration: the same round-trip + no-plaintext scan, against a
  # real S3 API (MinIO). A privileged job (kernel NFS mounts, pjdfstest)
  # joins in Phase 2.
  integration-minio:
    runs-on: ubuntu-latest
    services:
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: slatefs-test
        ports:
          - 9000:9000
    env:
      SLATEFS_TEST_URL: s3://slatefs-test/it
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT: http://localhost:9000
      AWS_ALLOW_HTTP: "true"
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p slatefs-core --test phase0 -- phase0_bucket_store --nocapture
