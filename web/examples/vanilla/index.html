<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SlateFS vanilla embedding proof</title>
    <style>
      body {
        margin: 0;
        padding: 2rem;
        background: #eef3f1;
        color: #17221f;
        font-family: system-ui;
        --slatefs-color-accent: #7957d5;
        --slatefs-radius: 16px;
      }
      main {
        max-width: 72rem;
        margin: auto;
      }
      header {
        margin-bottom: 2rem;
      }
      .grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 1rem;
      }
      slatefs-file-explorer::part(toolbar) {
        background: #f8f6ff;
      }
      slatefs-snapshot-manager::part(snapshot-row) {
        border-left: 3px solid #7957d5;
      }
      #events {
        padding: 1rem;
        background: #17221f;
        color: white;
        border-radius: 10px;
        margin-top: 1rem;
      }
      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p>Framework-free embedding</p>
        <h1>Host-injected SlateFS components</h1>
        <p>
          This page owns its mock client and event orchestration. The components
          use no demo session or global store.
        </p>
      </header>
      <div class="grid">
        <slatefs-file-explorer id="explorer" volume="documents" path="/"
          ><span slot="actions"></span></slatefs-file-explorer
        ><slatefs-snapshot-manager
          id="snapshots"
          volume="documents"
        ></slatefs-snapshot-manager>
      </div>
      <p id="events" role="status" aria-live="polite">
        Interact with a component to see composed events.
      </p>
    </main>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
